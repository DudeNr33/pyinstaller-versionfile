[tox]
envlist = {py310,py311,py312,py313,py314}-tests,py310-lint
skip_missing_interpreters = true

[testenv]

deps =
    {tests,cov}:    pytest
    win:            pywin32
    win:            pyinstaller
    cov:            coverage
    cov:            pytest-cov

    lint:           pylint<4

passenv =
    includeE2E

commands_pre =
    nolibyaml:      python -m pip install --upgrade --force-reinstall --global-option="--without-libyaml" PyYAML

commands =
    tests:          pytest \
    tests-cov:          --cov={envsitepackagesdir}/pyinstaller_versionfile \
    tests-cov:          --cov-branch \
    tests-cov:          --cov-report=html:{envtmpdir}/testresults/htmlcov \
    tests:              --junitxml={envtmpdir}/testresults/junit.{envname}.xml \
    tests:              --junit-prefix={envname} \
    tests:              {posargs:test}

    lint:           pylint --rcfile=pylintrc src

[gh-actions]
python = 
    3.10: py3.10-tests
    3.11: py3.11-tests
    3.12: py3.12-tests
    3.13: py3.13-tests
    3.14: py3.14-tests

# Pytest configuration
[pytest]
junit_family = xunit2

# Coverage measurement configuration
[coverage:run]
source = ./src
omit =
    */_empty
    */docs/*
    */*.txt
    */*.md
    */setup.py
    */LICENSE
